services:
  - type: web
    name: slide-battle-live
    env: node
    region: sa-east-1  # São Paulo, Brasil - más cercano a Chile
    plan: free
    buildCommand: "cd server && npm install"
    startCommand: "cd server && node server.js"
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3005
      - key: JUEZ1_USER
        sync: false
      - key: JUEZ1_PASS
        sync: false
      - key: JUEZ2_USER
        sync: false
      - key: JUEZ2_PASS
        sync: false
      - key: JUEZ3_USER
        sync: false
      - key: JUEZ3_PASS
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
        # ⚠️ OBLIGATORIO: Configura esta variable en el dashboard de Render
        # Ve a: https://dashboard.render.com > tu servicio > Environment > Add Environment Variable
        # Obten la URL desde Supabase: Project Settings > Database > Connection string
        # Formato: postgresql://postgres:tu_password@db.xxx.supabase.co:5432/postgres
